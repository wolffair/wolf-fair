<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf Fair</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;

    /* background hutan gelap */
    background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url("forest.jpg");
    background-size:cover;
    background-position:center;
}

/* bulan besar */
.moon{
    width:180px;
    height:180px;
    background:radial-gradient(circle,#ffa726,#ff8f00);
    border-radius:50%;
    margin:60px auto;
    box-shadow:0 0 80px #ff9800;
}

/* logo serigala */
.logo{
    width:280px;
    margin:auto;
    display:block;
    filter: drop-shadow(0 0 30px orange);
}

/* judul */
.title{
    font-size:36px;
    letter-spacing:4px;
    margin-top:20px;
    color:#ffa726;
}

/* teks kecil */
.subtitle{
    margin-top:10px;
    color:#bbb;
    font-size:14px;
}

</style>
</head>

<body>

<div class="moon"></div>

<img src="wolf-logo.png" class="logo">

<div class="title">WOLF FAIR</div>

<div class="subtitle">
Early builders phase
</div>

</body>
</html>
